name: Secret Scanning (gitleaks)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run gitleaks scan
        uses: zricethezav/gitleaks-action@v4
        with:
          args: --redact --verbose
